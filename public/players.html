<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EFL Fantasy — Player Stats</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Dexter's Corner</h1>
    <nav>
      <a href="index.html" class="nav-link">League Table</a>
      <a href="players.html" class="nav-link active">Player Stats</a>
      <a href="picks.html" class="nav-link">Optimal Picks</a>
    </nav>
  </header>

  <main>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
      <div class="search-area" style="flex: 1;">
        <input id="search-input" type="text" placeholder="Search for a player..." autocomplete="off" />
        <div id="search-results"></div>
      </div>
      <div style="display: flex; gap: 8px; margin-left: 16px; align-items: center;">
        <select id="squad-select" style="padding: 8px; border-radius: 4px; border: 1px solid #ccc; cursor: pointer;">
          <option value="">Select squad...</option>
        </select>
        <button id="refresh-stats-btn" style="padding: 8px 16px; background: #f05a28; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; white-space: nowrap;">Export Stats</button>
      </div>
    </div>
    <div id="refresh-message"></div>
    <div id="progress-bar" style="display: none; margin-bottom: 16px;">
      <div style="background: #e9ecef; height: 24px; border-radius: 4px; overflow: hidden;">
        <div id="progress-fill" style="background: #f05a28; height: 100%; width: 0%; transition: width 0.3s; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; font-weight: bold;"></div>
      </div>
    </div>
    <div id="leaderboard"></div>
    <div id="player-stats"></div>
  </main>

  <script src="players.js"></script>

</body>
</html>
