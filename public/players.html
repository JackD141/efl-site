<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EFL Fantasy — Player Stats</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Dexter's Corner</h1>
    <nav>
      <a href="index.html" class="nav-link">League Table</a>
      <a href="players.html" class="nav-link active">Player Stats</a>
      <a href="picks.html" class="nav-link">Optimal Picks</a>
    </nav>
  </header>

  <main>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
      <div class="search-area" style="flex: 1;">
        <input id="search-input" type="text" placeholder="Search for a player..." autocomplete="off" />
        <div id="search-results"></div>
      </div>
      <button id="refresh-stats-btn" style="padding: 8px 16px; background: #f05a28; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-left: 16px; white-space: nowrap;">Refresh & Save Stats</button>
    </div>
    <div id="refresh-message"></div>
    <div id="leaderboard"></div>
    <div id="player-stats"></div>
  </main>

  <script src="players.js"></script>

</body>
</html>
